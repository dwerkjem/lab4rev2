pre-commit:
  commands:
    generate-typer-completions:
      run: scripts/generate_completions.sh

    uv-pip-freeze:
      run: uv pip freeze --exclude-editable > requirements.txt && git add requirements.txt

    pre-commit:
      run: uv run pre-commit run --all-files
    
pre-push:
  commands:
    build-docs:
      run: scripts/build_docs.sh
      glob: "docs/*.js"