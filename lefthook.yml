pre-commit:
  commands:
    generate-typer-completions:
      run: scripts/generate_completions.sh

    uv-pip-freeze:
      run: uv pip freeze --exclude-editable > requirements.txt && git add requirements.txt

    generate-docs:
      run: uv run pydoc-markdown --render-toc && git add docs/reference.md

    pre-commit:
      run: uv run pre-commit run --all-files