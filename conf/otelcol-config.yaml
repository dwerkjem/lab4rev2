receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

  prometheus:
    config:
      scrape_configs:
        - job_name: "fountain-view-hall"
          scrape_interval: 5s
          metrics_path: /metrics
          static_configs:
            - targets:
                - host.docker.internal:8000

  filelog:
    include:
      - /project-logs/app.log
    start_at: beginning
    include_file_path: true
    include_file_name: true

processors:
  batch:

  resource/logs:
    attributes:
      - key: service.name
        value: lab4
        action: insert
      - key: deployment.environment
        value: local
        action: insert

exporters:
  otlphttp/metrics:
    endpoint: http://127.0.0.1:9090/api/v1/otlp

  otlphttp/logs:
    endpoint: http://127.0.0.1:3100/otlp

service:
  pipelines:
    metrics:
      receivers: [otlp, prometheus]
      processors: [batch]
      exporters: [otlphttp/metrics]

    logs:
      receivers: [otlp, filelog]
      processors: [resource/logs, batch]
      exporters: [otlphttp/logs]